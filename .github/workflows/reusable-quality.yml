name: Reusable Quality

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        run: rustup show active-toolchain

      - name: Check Formatting
        run: cargo fmt --check

  debug_build:
    name: Debug Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        run: rustup show active-toolchain

      - name: Rust Cache Key
        id: rust
        run: echo "version=$(rustc -V | sed 's/[^A-Za-z0-9_.-]/-/g')" >> "${GITHUB_OUTPUT}"

      - name: Restore Rust Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/**/*.rs') }}
          restore-keys: |
            cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-
            cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-

      - name: Build Debug Targets
        run: cargo build --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - debug_build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        run: rustup show active-toolchain

      - name: Rust Cache Key
        id: rust
        run: echo "version=$(rustc -V | sed 's/[^A-Za-z0-9_.-]/-/g')" >> "${GITHUB_OUTPUT}"

      - name: Restore Rust Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/**/*.rs') }}
          restore-keys: |
            cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-
            cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-

      - name: Test
        run: cargo test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs:
      - debug_build
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        run: rustup show active-toolchain

      - name: Rust Cache Key
        id: rust
        run: echo "version=$(rustc -V | sed 's/[^A-Za-z0-9_.-]/-/g')" >> "${GITHUB_OUTPUT}"

      - name: Restore Rust Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/**/*.rs') }}
          restore-keys: |
            cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-
            cargo-debug-${{ runner.os }}-${{ steps.rust.outputs.version }}-

      - name: Clippy
        run: cargo clippy --all-targets

  release_build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        run: rustup show active-toolchain

      - name: Rust Cache Key
        id: rust
        run: echo "version=$(rustc -V | sed 's/[^A-Za-z0-9_.-]/-/g')" >> "${GITHUB_OUTPUT}"

      - name: Restore Rust Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-release-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/**/*.rs') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-${{ steps.rust.outputs.version }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-
            cargo-release-${{ runner.os }}-${{ steps.rust.outputs.version }}-

      - name: Build
        run: cargo build --release

      - name: Check Binary Name
        run: test -x target/release/forgejo-webhooks-gotify

  container_scan:
    name: Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Image
        run: |
          image="forgejo-webhooks-gotify:quality-${GITHUB_SHA}"
          docker build --tag "${image}" .
          echo "QUALITY_IMAGE=${image}" >> "${GITHUB_ENV}"

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.QUALITY_IMAGE }}
          trivyignores: .trivyignore
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true
          version: v0.70.0

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs:
      - format
      - debug_build
      - test
      - clippy
      - release_build
      - container_scan
    if: always()
    steps:
      - name: Check Quality Results
        run: |
          failed=0
          for result in \
            "${{ needs.format.result }}" \
            "${{ needs.debug_build.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.release_build.result }}" \
            "${{ needs.container_scan.result }}"
          do
            if [ "${result}" != "success" ]; then
              failed=1
            fi
          done

          if [ "${failed}" -ne 0 ]; then
            echo "One or more quality jobs failed."
            exit 1
          fi
