name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows:
      - PR
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-Merge Dependabot
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Merge Dependabot PRs
        run: |
          prs="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '.[] | select(.state == "open" and .user.login == "dependabot[bot]") | [.number, .head.sha] | @tsv')"

          if [ -z "${prs}" ]; then
            echo "No open Dependabot PR for successful quality run."
            exit 0
          fi

          while IFS="$(printf '\t')" read -r pr sha; do
            gh pr merge "${pr}" \
              --repo "${GITHUB_REPOSITORY}" \
              --auto \
              --squash \
              --delete-branch \
              --match-head-commit "${sha}"
          done <<< "${prs}"
        env:
          GH_TOKEN: ${{ github.token }}
