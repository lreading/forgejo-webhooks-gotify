version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 10
    allow:
      - dependency-name: "*"
        dependency-type: direct
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    open-pull-requests-limit: 5

  - package-ecosystem: rust-toolchain
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/New_York
    cooldown:
      default-days: 10
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    cooldown:
      default-days: 10
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/New_York
    cooldown:
      default-days: 10
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    open-pull-requests-limit: 5
