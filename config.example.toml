[logging]
# Log level or tracing filter.
# Default: info
level = "info"

[notification]
# Notification body fields to hide.
# Default: []
body_exclude_fields = []

[server]
# Address and port to listen on.
# Default: 0.0.0.0:3000
bind_addr = "0.0.0.0:3000"

# HTTP path that receives webhooks.
# Default: /webhook
webhook_path = "/webhook"

[gotify]
# Gotify base URL.
# Required
base_url = "https://gotify.example.com"

# Gotify application token.
# Required
app_token = "replace-me"

# Gotify message priority.
# Default: 5
priority = 5

# Gotify notification title prefix.
# Default: Forgejo
title_prefix = "Forgejo"

[forgejo]
# Forgejo webhook secret for signature validation.
# Default: unset
# secret = "replace-me"

# Forgejo events to forward.
# Default: ["action_run_failure"]
events = ["action_run_failure"]
